<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Gabri ai concerti</title>

<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0a0b">
<script>
  // set theme before paint to avoid flash; mirrors the React logic
  (function(){
    try{
      var m=localStorage.getItem("theme");
      if(m!=="dark"&&m!=="light"&&m!=="system") m="dark";
      var resolved = m==="system" ? (window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light") : m;
      document.documentElement.setAttribute("data-theme",resolved);
    }catch(e){ document.documentElement.setAttribute("data-theme","dark"); }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
